settings.help.title=Wrapper template syntax
settings.help.description=<p>Every template must include <b>${widget}</b> — it is replaced with the widget under the caret.</p>\
<p><b>Tab-stops</b> (live template after wrapping):</p>\
<p><b>${name:default}</b> — editable field pre-filled with <i>default</i> (e.g. ${opacity:0.5}). Tab cycles between them.</p>\
<p><b>${name}</b> — editable field with an empty default.</p>\
<p><b>${end}</b> — final caret position after the last tab-stop.</p>\
<p><b>widget</b> and <b>end</b> are reserved. Marker defaults cannot contain curly braces.</p>\
<p><b>Parent rules</b> (when the intention appears):</p>\
<p><b>Allowed parents</b> — comma-separated names, or <b>any</b> for no restriction.</p>\
<p><b>Disallowed parents</b> — hide the wrapper under these parents.</p>\
<p><b>Requires direct parent</b> — only when the widget’s immediate parent matches an allowed parent (e.g. Flexible under Row/Column).</p>
